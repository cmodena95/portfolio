<script>

// CIRCLES

  const circles = document.querySelectorAll('.circle');

  const toggleSelected = (event) => {
    const clickedCircle = event.currentTarget;
    if (clickedCircle.classList.contains('open')) {
      circles.forEach(circle => circle.classList.remove('open'));
      circles.forEach(circle => circle.classList.remove('small'));
    } else {
      circles.forEach(circle => circle.classList.remove('open'));
      circles.forEach(circle => circle.classList.remove('small'));

      clickedCircle.classList.add('open');
      circles.forEach(circle => circle.classList.add('small'));
      clickedCircle.classList.remove('small');
    }
  }

  circles.forEach(circle => circle.addEventListener('click', toggleSelected));


// ILLUSTRATIONS CAROUSEL

  const illustrationsButton = document.querySelector('#illustrations');
  const illustrationsSection = document.querySelector('.illustrations-section');

  const toggleIllustrations = (event) => {
    illustrationsSection.classList.toggle("hidden");
  }

  illustrationsButton.addEventListener('click', toggleIllustrations);



// TOGGLE HIDDEN CLASS

</script>
