<script>

// CIRCLES

  const circles = document.querySelectorAll('.circle');

  const toggleSelected = (event) => {
    const clickedCircle = event.currentTarget;
    if (clickedCircle.classList.contains('open')) {
      circles.forEach(circle => circle.classList.remove('open'));
      circles.forEach(circle => circle.classList.remove('small'));
    } else {
      circles.forEach(circle => circle.classList.remove('open'));
      circles.forEach(circle => circle.classList.remove('small'));

      clickedCircle.classList.add('open');
      circles.forEach(circle => circle.classList.add('small'));
      clickedCircle.classList.remove('small');
    }
  }

  circles.forEach(circle => circle.addEventListener('click', toggleSelected));





// ILLUSTRATION CIRCLE

  const illustrationsButton = document.querySelector('#illustrations');
  const illustrationsSection = document.querySelector('.illustrations-section');

  const toggleIllustrations = (event) => {
    if (!booksSection.classList.contains("hidden")) {
      booksSection.classList.toggle("hidden");
    }

    if (!websitesSection.classList.contains("hidden")) {
      websitesSection.classList.toggle("hidden");
    }

    illustrationsSection.classList.toggle("hidden");
  }

  illustrationsButton.addEventListener('click', toggleIllustrations);


// ILLUSTRATIONS MODAL WINDOW

var modal = document.getElementById("illustration-modal");

var content = document.getElementById("modal-content-illustration");

var images = document.querySelectorAll(".img");

var span = document.getElementsByClassName("close")[0];


images.forEach(img => (img.onclick = function() {
  var imageSource = img.src;

  console.log(imageSource);

  modal.style.display = "flex";

  content.src = imageSource;
}));

span.onclick = function() {
  modal.style.display = "none";
}

window.onclick = function(event) {
  if (event.target == modal) {
    modal.style.display = "none";
  }
}




// BOOKS CIRCLE

const booksButton = document.querySelector('#books');
const booksSection = document.querySelector('.books-section');

const toggleBooks = (event) => {
  if (!illustrationsSection.classList.contains("hidden")) {
    illustrationsSection.classList.toggle("hidden");
  }

  if (!websitesSection.classList.contains("hidden")) {
    websitesSection.classList.toggle("hidden");
  }

  booksSection.classList.toggle("hidden");
}

booksButton.addEventListener('click', toggleBooks);




// WEBSITES CIRCLE

const websitesButton = document.querySelector('#websites');
const websitesSection = document.querySelector('.websites-section');

const toggleWebsites = (event) => {
  if (!illustrationsSection.classList.contains("hidden")) {
    illustrationsSection.classList.toggle("hidden");
  }

  if (!booksSection.classList.contains("hidden")) {
    booksSection.classList.toggle("hidden");
  }

  websitesSection.classList.toggle("hidden");
}

websitesButton.addEventListener('click', toggleWebsites);

// HANDYLADIES BUTTONS

const handyladiesButton1 = document.getElementById('handyladies-button-1');
const handyladiesButton2 = document.getElementById('handyladies-button-2');

const handyladiesImage1 = document.querySelector(".handyladies-img-1");
const handyladiesImage2 = document.querySelector(".handyladies-img-2");

const changeToHandyladiesImage2 = (event) => {
  if (!handyladiesImage1.classList.contains("hidden")) {
    handyladiesImage1.classList.toggle("hidden");

    handyladiesImage2.classList.toggle("hidden");

    handyladiesButton1.style.opacity = 0.5;
    handyladiesButton2.style.opacity = 1;
  }
}



const changeToHandyladiesImage1 = (event) => {
  if (!handyladiesImage2.classList.contains("hidden")) {
    handyladiesImage2.classList.toggle("hidden");

    handyladiesImage1.classList.toggle("hidden");

    handyladiesButton2.style.opacity = 0.5;
    handyladiesButton1.style.opacity = 1;
  }
}

handyladiesButton2.addEventListener('click', changeToHandyladiesImage2);
handyladiesButton1.addEventListener('click', changeToHandyladiesImage1);

</script>
